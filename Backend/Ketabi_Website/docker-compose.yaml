services:
  redis:
    image: redis:alpine
    container_name: ketabi_redis
    restart: always
    ports:
      - "6379:6379"  

  app:
    build: .
    image: book-store-app:local 
    container_name: ketabi_app
    restart: always
    env_file: .env
    ports:
      - "3000:3000"  
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    dns:
      - 8.8.8.8
      - 8.8.4.4



  nginx:
    image: nginx:alpine
    container_name: ketabi_nginx
    restart: always
    ports:
      - "80:80"    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app