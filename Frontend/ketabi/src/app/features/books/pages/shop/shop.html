<div class="shop-container">
  <div class="container-fluid py-5">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-lg-3 col-md-4">
        <app-filter-sidebar (filtersChanged)="onFiltersChanged($event)"></app-filter-sidebar>
      </div>

      <!-- Shop Content -->
      <div class="col-lg-9 col-md-8">
        <div class="shop-header mb-4">
          <h1>Our Shop</h1>
          <p class="results-count" *ngIf="!loading">
            Total Books: <strong>{{ totalResults }}</strong>
          </p>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="text-center py-5">
          <div class="spinner-border text-primary"></div>
          <p class="mt-3">Loading...</p>
        </div>

        <!-- Error -->
        <div *ngIf="error && !loading" class="alert alert-danger">{{ error }}</div>

        <!-- Books Grid -->
        <div class="row g-4" *ngIf="!loading && !error && books.length > 0">
          <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let book of books">
            <app-book-card  
              [book]="book" 
              [id]="book._id"
              [image]="book.image?.url" 
              [title]="book.name" 
              [author]="book.author"
              [price]="book.finalPrice || book.price" 
              [rating]="book.avgRating">
            </app-book-card>
          </div>
        </div>

        <!-- No Books -->
        <div *ngIf="!loading && books.length === 0" class="no-results text-center py-5">
          <i class="fas fa-search fa-3x mb-3 text-muted"></i>
          <h3>No Books Available</h3>
        </div>

        <!--  Pagination Component -->
        <app-pagination *ngIf="!loading && books.length > 0" [totalItems]="totalResults" [pageSize]="pageSize"
          [currentPage]="currentPage" [maxPagesToShow]="5" (pageChanged)="onPageChanged($event)"></app-pagination>
      </div>
    </div>
  </div>
</div>
