<div class="split-container">
  <div class="left-section">
    <img src="/images/mainBg.jpg" alt="Background" />
  </div>

  <div class="right-section">
    <div class="register-container">
      <h1>Sign Up</h1>

      <!-- Use the register form component and pass data -->
      <app-register-form
        [isLoading]="isLoading"
        [errorMessage]="errorMessage"
        [showOtpInput]="showOtpInput"
        [validationErrors]="validationErrors"
        (submitRegister)="onRegisterSubmit($event)"
        (submitOtp)="onOtpSubmit($event)"
        (resendOtpClick)="onResendOtp()"
        (socialLogin)="onSocialLogin($any($event))"
      ></app-register-form>
    </div>
  </div>
</div>
