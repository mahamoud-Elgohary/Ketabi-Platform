<!-- Floating Button -->
<div class="chatbot-container">
  <!-- Floating Toggle Button -->
  <div class="chatbot-toggle" (click)="toggleWidget()" *ngIf="!isOpen" title="Chat with AI Assistant">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Chat Bubble Icon -->
      <path
        d="M14 2C7.37 2 2 6.7 2 12.5c0 3.2 1.45 6.15 3.9 8.15L4 26l6.5-3.6C12.5 24 13.2 24 14 24c6.63 0 12-4.7 12-10.5S20.63 2 14 2z"
        fill="white" stroke="white" stroke-width="0.5" />
    </svg>
    <span class="badge">AI</span>
  </div>

  <!-- Chat Widget -->
  <div class="chatbot-widget" [class.open]="isOpen">
    <!-- Header -->
    <div class="chatbot-header">
      <div class="header-content">
        <h3>🤖 Ketabi AI Assistant</h3>
        <p>Book Recommendations</p>
      </div>
      <div class="header-actions">
        <button class="btn-clear" (click)="clearChat()" title="Clear chat">🗑️</button>
        <button class="btn-close" (click)="closeWidget()" title="Close">✕</button>
      </div>
    </div>

    <!-- Messages Area -->
    <div class="chatbot-messages">
      <div *ngFor="let msg of messages" [class]="'message message-' + msg.type">
        <div class="message-content">
          <p class="message-text">{{ msg.message }}</p>

          <!-- Books Display -->
          <div *ngIf="msg.books && msg.books.length > 0" class="books-container">
            <div *ngFor="let book of msg.books.slice(0, 3)" class="book-item" [routerLink]="['/books', book._id]">
              <img [src]="book.image?.url" [alt]="book.name" class="book-cover">
              <div class="book-info">
                <h5>{{ book.name }}</h5>
                <p class="author">by {{ book.author }}</p>
                <p class="book-genre">{{ book.genreName || 'Unknown Genre' }}</p>
                <p class="price">{{ book.price | currency }}</p>
                <span class="rating">⭐ {{ book.avgRating }}/5</span>
              </div>

              <!-- Add to Cart Button: icon only, stop propagation to avoid navigation when clicked -->
              <button class="btn-add-cart" (click)="$event.stopPropagation(); addToCart($event, book)"
                aria-label="Add to cart" title="Add to cart">
                <i class="fa fa-shopping-cart" aria-hidden="true"></i>
              </button>
            </div>
          </div>


          <span class="message-time">{{ msg.timestamp | date:'short' }}</span>
        </div>
      </div>

      <!-- Loading Indicator -->
      <div *ngIf="isLoading" class="message message-bot">
        <div class="message-content">
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input">
      <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Ask about books..."
        class="input-field" [disabled]="isLoading">
      <button (click)="sendMessage()" class="btn-send" [disabled]="isLoading || !userInput.trim()">

        <svg *ngIf="!isLoading" width="18" height="18" viewBox="0 0 24 24" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.9429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.01449073 C3.34915502,0.9 2.40734225,0.9 1.77946707,1.28702554 C0.994623095,1.91571827 0.837654326,3.0051213 1.15159189,3.79060827 L3.03521743,10.2316012 C3.03521743,10.3886986 3.19218622,10.5457961 3.50612381,10.5457961 L16.6915026,11.3312831 C16.6915026,11.3312831 17.1624089,11.3312831 17.1624089,10.8599911 L17.1624089,12.0000821 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"
            fill="white" />
        </svg>

        <svg *ngIf="isLoading" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
          class="spinner">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none" stroke-dasharray="15.7 47.1" />
        </svg>
      </button>
    </div>

    <!-- Error Message -->
    <div *ngIf="hasError" class="error-banner">
      {{ errorMessage }}
    </div>
  </div>
</div>
