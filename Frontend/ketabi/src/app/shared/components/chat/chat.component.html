<!-- chat.component.html -->

<!-- Floating Chat Button -->
<div class="chat-button-container">
  <button class="chat-fab" (click)="toggleChat()" [class.active]="isChatOpen">
    <!-- Chat Icon -->
    @if(!isChatOpen) {
    <i class="fa-solid fa-headset chat-icon fs-4"></i>
    }

    <!-- Close Icon -->
    <svg *ngIf="isChatOpen" class="chat-icon" viewBox="0 0 24 24" fill="none">
      <path
        d="M18 6L6 18M6 6L18 18"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>

    <!-- Unread Badge -->
    <span class="unread-badge" *ngIf="unreadCount > 0 && !isChatOpen">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>

    <!-- Pulse Animation -->
    <span class="pulse-ring" *ngIf="!isChatOpen"></span>
  </button>
</div>

<!-- Chat Window -->
<div class="chat-window" [class.open]="isChatOpen">
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-info">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <!-- Non-admin header -->
        <div class="header-text" *ngIf="currentUserRole !== 'admin'">
          <h3>{{ recipientName }}</h3>
          <span class="status-indicator" [class.online]="isRecipientOnline()">
            {{ isRecipientOnline() ? 'Online' : 'Offline' }}
          </span>
        </div>
        <!-- Admin header: conversation selector -->
        <div class="header-text admin-header" *ngIf="currentUserRole === 'admin'">
          <label class="admin-label">Customer</label>
          <select
            class="conversation-select"
            [(ngModel)]="recipientId"
            (ngModelChange)="onRecipientChange($event)"
          >
            <option [ngValue]="''" disabled>Select a user...</option>
            <option *ngFor="let conv of userConversations" [ngValue]="conv.userId">
              {{ conv.name || conv.userId }}
              {{ conv.online ? '(Online)' : '(Offline)' }}
              {{ conv.unread > 0 ? ' - ' + conv.unread + ' new' : '' }}
            </option>
          </select>
        </div>
      </div>
      <button class="close-button" (click)="closeChat()">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M18 6L6 18M6 6L18 18"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <!-- Messages Container -->
    <div class="messages-container" #messageContainer>
      <div *ngIf="messages.length === 0" class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <p>No messages yet</p>
        <span>Start a conversation with our support team</span>
      </div>

      <!-- System Messages (e.g., Admin joined) -->
      <div *ngFor="let sys of systemMessages" class="system-message">
        {{ sys }}
      </div>

      <div
        *ngFor="let message of messages"
        class="message-wrapper"
        [class.own-message]="message.isOwn"
        [class.received-message]="!message.isOwn"
      >
        <div class="message-bubble">
          <div class="message-content">{{ message.content }}</div>
          <div class="message-time">
            {{ message.timestamp | date : 'shortTime' }}
          </div>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div
        class="message-wrapper received-message typing-indicator-wrapper"
        *ngIf="isRecipientTyping"
      >
        <div class="message-bubble typing-indicator">
          <div class="typing-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-container">
      <div class="input-wrapper">
        <textarea
          [(ngModel)]="messageInput"
          (input)="onMessageInput()"
          placeholder="Type your message..."
          class="message-input"
          (keypress)="onKeyPress($event)"
          [disabled]="!isConnected"
          rows="1"
        ></textarea>
        <button
          (click)="sendMessage()"
          class="send-button"
          [disabled]="!isConnected || !messageInput.trim()"
        >
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path
              d="M22 2L15 22L11 13L2 9L22 2Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>

      <!-- Connection Status -->
      <div class="connection-info" *ngIf="!isConnected">
        <span class="connection-warning">● Connecting...</span>
      </div>
    </div>
  </div>
</div>
